<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chúc May Mắn Trần Ngọc Ánh</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #030f26 url('./bg_blue.png') center/cover fixed no-repeat;
            min-height: 100vh;
            min-height: 100dvh;
            color: #ffffff;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
            position: relative;
        }

        /* Dark overlay to make text readable */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(3, 15, 38, 0.4) 0%, rgba(3, 15, 38, 0.8) 100%);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Responsive Layout for Desktop */
        @media (min-width: 768px) {
            body {
                align-items: flex-start;
                padding-left: 10vw;
            }

            .container {
                max-width: 420px;
            }
        }

        /* Glass Card */
        .glass-card {
            background: rgba(16, 33, 71, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
            animation: fadeUp 0.8s ease-out;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Typography */
        .title {
            font-size: clamp(24px, 6vw, 32px);
            font-weight: 800;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: clamp(14px, 3.5vw, 16px);
            color: #a8c0ff;
            font-weight: 600;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .message {
            font-size: clamp(14px, 3.5vw, 16px);
            color: #e2e8f0;
            line-height: 1.6;
            margin-bottom: 0;
        }

        /* Japanese Cheers Section */
        .cheer-header {
            font-size: 13px;
            color: #88aacc;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
            margin-bottom: 10px;
            text-align: center;
            animation: fadeUp 1s ease-out 0.2s both;
        }

        .jp-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .jp-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: fadeUp 0.8s ease-out both;
        }

        .jp-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
            border-color: rgba(79, 172, 254, 0.5);
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.2);
        }

        .jp-item:nth-child(1) {
            animation-delay: 0.3s;
        }

        .jp-item:nth-child(2) {
            animation-delay: 0.4s;
        }

        .jp-item:nth-child(3) {
            animation-delay: 0.5s;
        }

        .jp-icon {
            font-size: 28px;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.4));
            flex-shrink: 0;
        }

        .jp-text {
            text-align: left;
            flex: 1;
            min-width: 0;
        }

        .jp-kanji {
            font-size: 18px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 4px;
        }

        .jp-romaji {
            font-size: 12px;
            color: #4facfe;
            margin-bottom: 2px;
        }

        .jp-meaning {
            font-size: 13px;
            color: #a0aec0;
            font-style: italic;
        }

        .jp-play {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
            border-radius: 50%;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 242, 254, 0.4);
        }

        .jp-play svg {
            width: 14px;
            height: 14px;
            fill: #fff;
            margin-left: 2px;
        }

        /* Floating emojis */
        .floater {
            position: fixed;
            font-size: 24px;
            pointer-events: none;
            z-index: 100;
            animation: floatEmoji linear forwards;
            opacity: 0;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.5));
        }

        @keyframes floatEmoji {
            0% {
                transform: translateY(0) scale(0.5);
                opacity: 1;
            }

            50% {
                transform: translateY(-40vh) scale(1.2);
                opacity: 1;
            }

            100% {
                transform: translateY(-80vh) scale(1);
                opacity: 0;
            }
        }

        /* Speech Bubble */
        .speech-bubble {
            position: fixed;
            background: rgba(255, 255, 255, 0.95);
            color: #030f26;
            padding: 10px 18px;
            border-radius: 20px;
            font-size: clamp(13px, 3.5vw, 15px);
            font-weight: 800;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            z-index: 200;
            transform: translate(-50%, -100%);
            animation: bubbleAnim 2.5s ease-in-out forwards;
            max-width: 80vw;
            text-align: center;
            border: 2px solid rgba(79, 172, 254, 0.5);
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: rgba(255, 255, 255, 0.95) transparent transparent transparent;
        }

        @keyframes bubbleAnim {
            0% {
                opacity: 0;
                transform: translate(-50%, -80%) scale(0.5);
            }

            15% {
                opacity: 1;
                transform: translate(-50%, -100%) scale(1.1);
            }

            25% {
                transform: translate(-50%, -100%) scale(1);
            }

            80% {
                opacity: 1;
                transform: translate(-50%, -120%) scale(1);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -140%) scale(0.8);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Main Card -->
        <div class="glass-card">
            <div class="title">Trần Ngọc Ánh</div>
            <div class="subtitle">Kỳ thi THPT Quốc Gia 2026</div>
            <div class="message">
                Chúc em luôn bình tĩnh, tự tin để hoàn thành tốt bài thi và có một mùa thi thật trọn vẹn.🍀✨
            </div>
        </div>

        <div class="cheer-header">Chạm để nghe cổ vũ từ Nhật Bản</div>

        <!-- Japanese Cheers -->
        <div class="jp-list" id="jpList">
            <!-- Items injected by JS -->
        </div>
    </div>

    <script>
        // Floating emoji burst on click/tap
        const emojis = ['🍀', '✨', '🌟', '🎏', '💪', '🎯', '💙', '🚀'];
        let lastBurst = 0;

        function burst(x, y) {
            const now = Date.now();
            if (now - lastBurst < 200) return;
            lastBurst = now;
            const count = 6;
            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.className = 'floater';
                el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                const dx = (Math.random() - 0.5) * 100;
                el.style.left = (x + dx) + 'px';
                el.style.top = y + 'px';
                el.style.fontSize = (20 + Math.random() * 15) + 'px';
                const dur = 1.5 + Math.random() * 1.5;
                el.style.animationDuration = dur + 's';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), dur * 1000);
            }
        }

        const allPhrases = [
            { kanji: "頑張れ！", meaning: "Cố lên! Hết sức nào!" },
            { kanji: "必ず合格できる！", meaning: "Nhất định bạn sẽ đỗ!" },
            { kanji: "諦めるな！", meaning: "Đừng bỏ cuộc!" },
            { kanji: "君ならできる！", meaning: "Bạn chắc chắn làm được!" },
            { kanji: "全力を尽くせ！", meaning: "Dốc hết sức lực nào!" },
            { kanji: "あなたは最高だ！", meaning: "Bạn là tuyệt vời nhất!" },
            { kanji: "夢を叶えよう！", meaning: "Hãy biến ước mơ thành hiện thực!" }
        ];

        function showBubble(text, x, y) {
            const bubble = document.createElement('div');
            bubble.className = 'speech-bubble';
            bubble.textContent = text;
            bubble.style.left = x + 'px';
            bubble.style.top = (y - 20) + 'px';
            document.body.appendChild(bubble);
            setTimeout(() => bubble.remove(), 2500);
        }

        function handleGlobalInteraction(x, y, target) {
            burst(x, y);
            // Nếu bấm bên ngoài các thẻ tiếng Nhật, phát random
            if (!target.closest('.jp-item')) {
                const randomItem = allPhrases[Math.floor(Math.random() * allPhrases.length)];
                speakJapanese(randomItem.kanji);
                showBubble(randomItem.meaning, x, y);
            }
        }

        document.addEventListener('click', e => handleGlobalInteraction(e.clientX, e.clientY, e.target));
        document.addEventListener('touchstart', e => handleGlobalInteraction(e.touches[0].clientX, e.touches[0].clientY, e.target), { passive: true });

        // Speech Synthesis setup
        const jpData = [
            { icon: "🌸", kanji: "頑張れ！", romaji: "Ganbare!", meaning: "Cố lên! Hết sức nào!" },
            { icon: "🏆", kanji: "必ず合格できる！", romaji: "Kanarazu goukaku dekiru!", meaning: "Nhất định bạn sẽ đỗ!" },
            { icon: "✨", kanji: "君ならできる！", romaji: "Kimi nara dekiru!", meaning: "Bạn chắc chắn làm được!" }
        ];

        const listContainer = document.getElementById('jpList');

        jpData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'jp-item';
            div.innerHTML = `
                <div class="jp-icon">${item.icon}</div>
                <div class="jp-text">
                    <div class="jp-kanji">${item.kanji}</div>
                    <div class="jp-romaji">${item.romaji}</div>
                    <div class="jp-meaning">${item.meaning}</div>
                </div>
                <div class="jp-play">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </div>
            `;

            div.addEventListener('click', (e) => {
                // Sự kiện click ở thẻ sẽ kích hoạt phát đúng câu đó
                speakJapanese(item.kanji);
                showBubble(item.meaning, e.clientX, e.clientY);
            });

            listContainer.appendChild(div);
        });

        // Initialize voices
        let jaVoice = null;
        function loadVoices() {
            const voices = window.speechSynthesis.getVoices();
            jaVoice = voices.find(v => v.lang.startsWith('ja')) || voices[0];
        }

        if (window.speechSynthesis) {
            loadVoices();
            if (window.speechSynthesis.onvoiceschanged !== undefined) {
                window.speechSynthesis.onvoiceschanged = loadVoices;
            }
        }

        function speakJapanese(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'ja-JP';
            utter.rate = 0.9;
            utter.pitch = 1.1;
            if (jaVoice) utter.voice = jaVoice;
            window.speechSynthesis.speak(utter);
        }
    </script>
</body>

</html>
